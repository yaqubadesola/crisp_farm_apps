spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farm_db}
    username: ${DB_USERNAME:farm_user}
    password: ${DB_PASSWORD:farm_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  admin:
    initial-password: ${ADMIN_INITIAL_PASSWORD}

logging:
  level:
    com.crispfarm: INFO
    org.flywaydb: INFO
