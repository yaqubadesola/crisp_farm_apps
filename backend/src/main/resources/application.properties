server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/farm_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a 32+ character random string
app.jwt.secret=${JWT_SECRET:crispfarm-secret-key-must-be-at-least-32-chars!!}
app.jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────────────
logging.level.com.crispfarm=INFO
logging.level.org.springframework.security=WARN
